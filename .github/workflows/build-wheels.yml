name: Build wheels

on:
  workflow_dispatch:
  push:
    tags:
      - "*"

jobs:
  build-wheels-linux:
    name: Build wheels on Linux (${{ matrix.arch }})
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        arch: [x86_64, aarch64, ppc64le]
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.arch != 'x86_64'
        uses: docker/setup-qemu-action@v3

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: pip install cibuildwheel

      - name: Build wheels
        run: cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp38-* cp39-* cp310-* cp311-* cp312-* cp313-* cp314-*"
          CIBW_ARCHS_LINUX: ${{ matrix.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.arch }}
          path: wheelhouse/*.whl

  build-wheels-musllinux:
    name: Build musllinux wheels (${{ matrix.arch }})
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        arch: [x86_64, aarch64, ppc64le]
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.arch != 'x86_64'
        uses: docker/setup-qemu-action@v3

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: pip install cibuildwheel

      - name: Build wheels
        run: cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp38-* cp39-* cp310-* cp311-* cp312-* cp313-* cp314-*"
          CIBW_ARCHS_LINUX: ${{ matrix.arch }}
          CIBW_SKIP: "*-manylinux_*"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-musllinux-${{ matrix.arch }}
          path: wheelhouse/*.whl

  build-wheels-windows:
    name: Build wheels on Windows (${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [AMD64, x86]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: pip install cibuildwheel

      - name: Build wheels
        run: cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp38-* cp39-* cp310-* cp311-* cp312-* cp313-* cp314-*"
          CIBW_ARCHS_WINDOWS: ${{ matrix.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.arch }}
          path: wheelhouse/*.whl

  build-wheels-macos:
    name: Build wheels on macOS (${{ matrix.runner }} / ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: macos-14
            arch: arm64
            cibw_build: "cp38-* cp39-* cp310-*"
          - runner: macos-latest
            arch: arm64
            cibw_build: "cp311-* cp312-* cp313-* cp314-*"
          - runner: macos-14
            arch: x86_64
            cibw_build: "cp38-* cp39-* cp310-*"
          - runner: macos-latest
            arch: x86_64
            cibw_build: "cp311-* cp312-* cp313-* cp314-*"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: pip install cibuildwheel

      - name: Build wheels
        run: cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: ${{ matrix.cibw_build }}
          CIBW_ARCHS_MACOS: ${{ matrix.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.runner }}-${{ matrix.arch }}
          path: wheelhouse/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist
        run: pip install build && python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
